server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PDFs en base64 pueden ser grandes: subir el límite del body
    client_max_body_size 25m;

    # Interfaz estática (sin caché: siempre sirve la última versión de la web)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Proxy hacia los webhooks de n8n (mismo origen -> sin CORS)
    #   /api/generar        -> http://n8n:5678/webhook/generar
    #   /api/enviar-correo  -> http://n8n:5678/webhook/enviar-correo
    location /api/ {
        proxy_pass http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # La generación puede tardar más de un minuto (Groq + Kroki + Gotenberg)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }
}
